<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartWallet</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="nav">
      <a class="nav-link" href="index.html">SMART WALLET</a>
      <a class="nav-link" href="clasificacion.html"
        >Clasificación de transacciones</a
      >
      <a class="nav-link" href="analisis.html">Análisis financiero</a>
    </nav>

    <div class="container py-5">
      <header class="mb-5 text-center">
        <h2 class="display-6">Clasificar Transacciones</h2>
      </header>

      <div class="border rounded-4 shadow-sm p-4 mb-4 form-section">
        <h4 class="mb-3">Transacciones</h4>
        <div id="transacciones">
          <div class="transaccion mb-3">
            <label class="form-label">Descripción de la transacción</label>
            <input
              type="text"
              class="descripcion form-control form-control-sm mb-3"
            />

            <label class="form-label">Valor de la transacción</label>
            <input
              type="number"
              class="valor form-control form-control-sm mb-3 numeric-only"
              inputmode="numeric"
              pattern="[0-9]*"
            />
            <hr />
          </div>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button
            type="button"
            class="btn btn-theme btn-sm"
            onclick="agregarTransaccion()"
          >
            Agregar transacción
          </button>
          <button
            type="button"
            class="btn btn-outline-theme btn-sm"
            onclick="eliminarTransaccion()"
          >
            Eliminar transacción
          </button>
          <button
            type="button"
            class="btn btn-outline-theme btn-sm"
            onclick="resetClasificacionForm()"
          >
            Limpiar formulario
          </button>
          <button
            type="button"
            class="btn btn-theme btn-sm"
            onclick="cargarDatosPruebaClasificacion()"
          >
            Cargar datos de prueba
          </button>
          <button
            type="button"
            class="btn btn-theme btn-sm"
            onclick="enviarTransacciones()"
          >
            Enviar
          </button>
        </div>
      </div>

      <div class="border rounded-4 shadow-sm p-4 form-section mt-4">
        <h4 class="mb-3">JSON puro</h4>
        <label class="form-label">Editar / enviar directamente</label>
        <textarea
          id="jsonPuro"
          placeholder='[ {"descripcion":"...","valor":123.45} ]'
          rows="6"
          class="form-control"
          style="min-height: 140px; resize: vertical"
          oninput="autoResize(this)"
        ></textarea>

        <div class="mt-3 d-flex flex-wrap gap-2">
          <button
            type="button"
            class="btn btn-theme btn-sm"
            onclick="cargarDatosPruebaJSONClasificacion()"
          >
            Cargar datos de prueba
          </button>
          <button
            type="button"
            class="btn btn-theme btn-sm"
            onclick="enviarJSONPuro()"
          >
            Enviar
          </button>
          <button
            type="button"
            class="btn btn-outline-theme btn-sm"
            onclick="resetJSONPuro()"
          >
            Limpiar
          </button>
        </div>
      </div>

      <div
        id="resultadoContainerClasificacion"
        class="border rounded-4 shadow-sm p-4 form-section mt-4"
        style="display: none"
      >
        <h4 class="mb-3">Resultado</h4>
        <div
          id="resultadoClasificacion"
          class="p-3 rounded-3 bg-light shadow-sm"
          style="white-space: pre-wrap; display: none"
        ></div>
      </div>
    </div>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
